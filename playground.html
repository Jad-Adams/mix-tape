<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="button.css" />
</head>
<body>
  <button class="btn">
    <div class="btn-base">
      <div class="btn-base-bg">
        <div class="btn-base-texture" style="background-image: url('assets/shared/noise.png')"></div>
      </div>
      <div class="btn-base-border"></div>
      <div class="btn-cap">
        <div class="btn-cap-bg"></div>
        <div class="btn-cap-texture" style="background-image: url('assets/shared/noise.png')"></div>
        <div class="btn-icon"></div>
      </div>
      <div class="btn-inset-shadow"></div>
    </div>
  </button>
</body>
</html>
